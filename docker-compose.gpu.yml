services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml:ro
      - ./ollama/config.docker.yaml:/app/ollama/config.yaml:ro
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      - qdrant
      - ollama
    # PP-DocLayoutV3 (runs inside app container) gets GPU access via torch
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:v1.13.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # GLM-OCR (0.9B) offloaded entirely to GPU — ~2 GB VRAM
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  visualizer:
    build:
      context: .
      dockerfile: Dockerfile.visualizer
    ports:
      - "8501:8501"
    volumes:
      - ./ollama/output:/app/ollama/output

volumes:
  qdrant_data:
  ollama_models:
  huggingface_cache:
