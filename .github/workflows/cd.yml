name: CD

on:
  push:
    branches: [deployment]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      app_image: ${{ steps.build-app.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "685057748560"

      - name: Build and push app image
        id: build-app
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE=$REGISTRY/doc-parser/app:${{ github.sha }}
          docker build -t $IMAGE .
          docker tag $IMAGE $REGISTRY/doc-parser/app:latest
          docker push $IMAGE
          docker push $REGISTRY/doc-parser/app:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_APP }} \
            --force-new-deployment

      - name: Wait for service stable
        run: |
          echo "Polling ECS service stability (max 15 min)..."
          for i in $(seq 1 60); do
            RUNNING=$(aws ecs describe-services \
              --cluster ${{ secrets.ECS_CLUSTER }} \
              --services ${{ secrets.ECS_SERVICE_APP }} \
              --query 'services[0].runningCount' --output text)
            DESIRED=$(aws ecs describe-services \
              --cluster ${{ secrets.ECS_CLUSTER }} \
              --services ${{ secrets.ECS_SERVICE_APP }} \
              --query 'services[0].desiredCount' --output text)
            PENDING=$(aws ecs describe-services \
              --cluster ${{ secrets.ECS_CLUSTER }} \
              --services ${{ secrets.ECS_SERVICE_APP }} \
              --query 'services[0].pendingCount' --output text)
            echo "Attempt $i/60 — running=$RUNNING desired=$DESIRED pending=$PENDING"
            if [ "$RUNNING" = "$DESIRED" ] && [ "$PENDING" = "0" ]; then
              echo "Service is stable."
              exit 0
            fi
            sleep 15
          done
          echo "Service did not stabilize within 15 minutes."
          exit 1

      - name: Smoke test
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names doc-parser-alb \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          echo "Testing http://$ALB_DNS/health"
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_DNS/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1
